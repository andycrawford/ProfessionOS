<!-- Concept C: "Apex" — Premium Gradient Hero/Header Mockup -->
<!-- 1200×630 viewport · Dark gradient · Premium SaaS aesthetic -->
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Profession OS — Hero Concept C: Apex</title>
  <defs>
    <!-- Rich background gradient: deep navy to deeper indigo -->
    <linearGradient id="apexBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070B12"/>
      <stop offset="50%" stop-color="#0D1A2E"/>
      <stop offset="100%" stop-color="#0E0820"/>
    </linearGradient>
    <!-- Brand gradient: teal to blue -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
    <!-- Logo mark gradient -->
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
    <!-- Glow effect for mark -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00C9A7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glowLayer"/>
      <feMerge><feMergeNode in="glowLayer"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Headline gradient text -->
    <linearGradient id="headlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
    <!-- Card glassmorphism -->
    <linearGradient id="glassCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Ambient glow radials -->
    <radialGradient id="tealGlow" cx="20%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#070B12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="80%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#3D7EFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#070B12" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="1200" height="630" fill="url(#apexBg)"/>
  <!-- Ambient color glows -->
  <rect width="1200" height="630" fill="url(#tealGlow)"/>
  <rect width="1200" height="630" fill="url(#blueGlow)"/>

  <!-- Subtle noise/grain overlay (thin horizontal scan lines) -->
  <pattern id="grain" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="2" height="1" fill="white" opacity="0.012"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- ─── NAVIGATION BAR ─── -->
  <rect width="1200" height="60" fill="url(#apexBg)" opacity="0.95"/>
  <!-- Subtle separator -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Logo mark (gradient circle with P) in nav -->
  <circle cx="56" cy="30" r="18" fill="url(#markGrad)" filter="url(#glow)"/>
  <!-- P stem -->
  <rect x="50" y="20" width="2.5" height="20" rx="1.25" fill="white"/>
  <!-- P bowl arc -->
  <path d="M52.5 20 Q61 20 61 26 Q61 32 52.5 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Wordmark (white, clean, bold) -->
  <text x="82" y="36" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.025em" fill="white">Profession</text>
  <text x="186" y="36" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.025em" fill="url(#brandGrad)"> OS</text>

  <!-- Nav links (white, muted) -->
  <text x="320" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.55">Features</text>
  <text x="412" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.55">Pricing</text>
  <text x="492" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.55">Docs</text>
  <text x="556" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.55">Blog</text>

  <!-- Sign in (white) -->
  <text x="1036" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.7">Sign in</text>

  <!-- CTA Button (gradient border + fill) -->
  <rect x="1092" y="14" width="108" height="32" rx="16" fill="url(#brandGrad)"/>
  <text x="1146" y="34" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Get Started →</text>

  <!-- ─── HERO CONTENT — CENTERED LAYOUT ─── -->
  <!-- Eyebrow chip -->
  <rect x="360" y="86" width="480" height="30" rx="15" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="600" y="106" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="url(#brandGrad)" text-anchor="middle" letter-spacing="0.06em">PROFESSION OS · THE COMMAND CENTER FOR AMBITIOUS PROFESSIONALS</text>

  <!-- Headline: large, centered, with gradient accent word -->
  <text x="600" y="184" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" letter-spacing="-0.04em" fill="white" text-anchor="middle">Operate at your</text>
  <!-- "apex." in gradient -->
  <text x="600" y="258" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-0.04em" fill="url(#headlineGrad)" text-anchor="middle">apex.</text>

  <!-- Sub-headline (centered, muted) -->
  <text x="600" y="302" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="-0.01em">One AI-powered command center for your email, calendar,</text>
  <text x="600" y="324" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="-0.01em">code repositories, and CRM. Act faster. Miss nothing.</text>

  <!-- CTA buttons (centered) -->
  <rect x="456" y="354" width="168" height="50" rx="25" fill="url(#brandGrad)"/>
  <text x="540" y="384" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Start free →</text>

  <rect x="640" y="354" width="168" height="50" rx="25" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="724" y="384" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Watch demo</text>

  <!-- ─── FLOATING UI CARDS — BOTTOM (Glassmorphism style) ─── -->
  <!-- Three floating metric cards at the bottom, overlapping -->
  <!-- Left card: Email widget -->
  <rect x="80" y="444" width="220" height="140" rx="12" fill="url(#glassCard)" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <text x="104" y="472" font-family="Inter, sans-serif" font-size="10" fill="white" opacity="0.4" letter-spacing="0.06em">EMAIL</text>
  <text x="104" y="510" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="white">124</text>
  <text x="104" y="534" font-family="Inter, sans-serif" font-size="11" fill="#00C9A7">↑ 18% this week</text>
  <!-- Mini sparkline -->
  <polyline points="104,558 120,552 136,555 152,546 168,548 184,540 200,536 216,532 232,528 248,526 264,522 280,518 296,514" fill="none" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Center card: Calendar warning -->
  <rect x="320" y="428" width="220" height="156" rx="12" fill="url(#glassCard)" stroke="#FFA502" stroke-opacity="0.3" stroke-width="1"/>
  <text x="344" y="456" font-family="Inter, sans-serif" font-size="10" fill="white" opacity="0.4" letter-spacing="0.06em">CALENDAR</text>
  <text x="344" y="494" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="white">12</text>
  <rect x="344" y="508" width="160" height="22" rx="6" fill="#FFA502" fill-opacity="0.15" stroke="#FFA502" stroke-opacity="0.4" stroke-width="1"/>
  <text x="424" y="524" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFA502" text-anchor="middle">⚠ 3 conflicts Thursday</text>
  <!-- Resolve button -->
  <rect x="344" y="542" width="80" height="26" rx="13" fill="url(#brandGrad)"/>
  <text x="384" y="559" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Resolve →</text>

  <!-- Right card: AI panel -->
  <rect x="560" y="444" width="220" height="140" rx="12" fill="url(#glassCard)" stroke="#00C9A7" stroke-opacity="0.2" stroke-width="1"/>
  <text x="584" y="472" font-family="Inter, sans-serif" font-size="10" fill="#00C9A7" opacity="0.8" letter-spacing="0.06em">AI ASSISTANT</text>
  <!-- Suggestion text lines -->
  <rect x="584" y="486" width="160" height="6" rx="2" fill="white" opacity="0.15"/>
  <rect x="584" y="498" width="140" height="6" rx="2" fill="white" opacity="0.12"/>
  <rect x="584" y="510" width="90" height="6" rx="2" fill="white" opacity="0.08"/>
  <!-- Action pills -->
  <rect x="584" y="528" width="60" height="22" rx="11" fill="#00C9A7" opacity="0.2" stroke="#00C9A7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="614" y="543" font-family="Inter, sans-serif" font-size="9" fill="#00C9A7" text-anchor="middle">Ask AI</text>
  <rect x="652" y="528" width="60" height="22" rx="11" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="682" y="543" font-family="Inter, sans-serif" font-size="9" fill="white" fill-opacity="0.5" text-anchor="middle">Snooze</text>

  <!-- Far right card: Code stats -->
  <rect x="800" y="460" width="180" height="124" rx="12" fill="url(#glassCard)" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <text x="824" y="488" font-family="Inter, sans-serif" font-size="10" fill="white" opacity="0.4" letter-spacing="0.06em">CODE</text>
  <text x="824" y="524" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="white">11</text>
  <text x="824" y="546" font-family="Inter, sans-serif" font-size="11" fill="#3D7EFF">↑ open PRs</text>
  <rect x="824" y="554" width="100" height="4" rx="2" fill="#3D7EFF" opacity="0.3"/>
  <rect x="824" y="554" width="68" height="4" rx="2" fill="#3D7EFF" opacity="0.7"/>

  <!-- Gradient bottom fade to allow cards to "float" -->
  <rect x="0" y="570" width="1200" height="60" fill="url(#apexBg)" opacity="0.7"/>
</svg>
