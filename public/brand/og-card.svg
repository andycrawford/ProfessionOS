<!-- OG Social Card Template — 1200×630 -->
<!-- Use for: <meta og:image>, Twitter card, LinkedIn share, social preview -->
<!-- Built on Concept A ("Command") — primary recommended direction -->
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Profession OS — OG Social Card</title>
  <defs>
    <!-- Background depth -->
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0F12"/>
      <stop offset="100%" stop-color="#111720"/>
    </linearGradient>
    <!-- Teal glow: left anchor for wordmark -->
    <radialGradient id="ogGlowLeft" cx="15%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0D0F12" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow: right -->
    <radialGradient id="ogGlowRight" cx="85%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3D7EFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0D0F12" stop-opacity="0"/>
    </radialGradient>
    <!-- Headline gradient -->
    <linearGradient id="headlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="ogGrid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E2633" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGrid)" opacity="0.3"/>
  <rect width="1200" height="630" fill="url(#ogGlowLeft)"/>
  <rect width="1200" height="630" fill="url(#ogGlowRight)"/>

  <!-- ─── BORDER FRAME ─── -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#2A3140" stroke-width="2"/>
  <!-- Teal top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#headlineGrad)"/>

  <!-- ─── LOGO MARK (centered, large) ─── -->
  <!-- Terminal block mark — 96×96 centered -->
  <rect x="552" y="120" width="96" height="96" rx="14" fill="#161A1F"/>
  <rect x="552.5" y="120.5" width="95" height="95" rx="13.5" stroke="#2A3140" stroke-width="1"/>
  <!-- >_ symbol at mark scale -->
  <path d="M572 162 L589 170 L572 178" stroke="#00C9A7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="592" y="175" width="20" height="4" rx="2" fill="#00C9A7" opacity="0.9"/>

  <!-- ─── WORDMARK ─── -->
  <!-- "PROFESSION OS" — IBM Plex Mono, uppercase, teal accent -->
  <text x="600" y="272" font-family="'IBM Plex Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="22" font-weight="500" letter-spacing="0.12em" fill="#E8ECF0" text-anchor="middle">PROFESSION<tspan fill="#00C9A7"> OS</tspan></text>

  <!-- ─── TAGLINE ─── -->
  <!-- Primary tagline: large, gradient accent word -->
  <text x="600" y="352" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="-0.03em" fill="#E8ECF0" text-anchor="middle">Every signal.</text>
  <text x="600" y="420" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="-0.03em" fill="url(#headlineGrad)" text-anchor="middle">One surface.</text>

  <!-- ─── SUB-COPY ─── -->
  <text x="600" y="482" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#8B96A8" text-anchor="middle" letter-spacing="-0.005em">AI-powered command center for high-output professionals.</text>

  <!-- ─── DOMAIN BADGE ─── -->
  <rect x="500" y="526" width="200" height="32" rx="16" fill="#1E2329" stroke="#2A3140" stroke-width="1"/>
  <text x="600" y="547" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#8B96A8" text-anchor="middle" letter-spacing="0.04em">professionos.com</text>

  <!-- ─── DECORATIVE CORNER ELEMENTS ─── -->
  <!-- Top-left bracket mark -->
  <path d="M 40 40 L 40 20 L 60 20" stroke="#2A3140" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <!-- Top-right bracket -->
  <path d="M 1160 40 L 1160 20 L 1140 20" stroke="#2A3140" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <!-- Bottom-left bracket -->
  <path d="M 40 590 L 40 610 L 60 610" stroke="#2A3140" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <!-- Bottom-right bracket -->
  <path d="M 1160 590 L 1160 610 L 1140 610" stroke="#2A3140" stroke-width="1.5" fill="none" stroke-linecap="square"/>

  <!-- ─── MONOSPACE CORNER LABELS ─── -->
  <text x="48" y="36" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2A3140" letter-spacing="0.04em">professionos.com</text>
  <text x="1152" y="618" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2A3140" text-anchor="end" letter-spacing="0.04em">Command center for your work</text>
</svg>
