<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0D0720"/>
      <stop offset="40%"  stop-color="#1A0A2E"/>
      <stop offset="70%"  stop-color="#3D1C5C"/>
      <stop offset="88%"  stop-color="#A03060"/>
      <stop offset="100%" stop-color="#E86040"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="88%" r="18%">
      <stop offset="0%"  stop-color="#FFD580" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FF7A00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E86040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
</svg>
