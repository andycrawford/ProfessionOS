<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#030304"/>
    </radialGradient>
    <radialGradient id="haze" cx="50%" cy="50%" r="40%">
      <stop offset="0%"  stop-color="#1A1A2E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#030304" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#haze)"/>
</svg>
