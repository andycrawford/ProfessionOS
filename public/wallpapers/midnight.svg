<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#060A18"/>
      <stop offset="50%"  stop-color="#0A1528"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="35%" r="40%">
      <stop offset="0%"  stop-color="#1E3A5F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#060A18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="30%" cy="20%" r="30%">
      <stop offset="0%"  stop-color="#3D7EFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#060A18" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#star)"/>
</svg>
