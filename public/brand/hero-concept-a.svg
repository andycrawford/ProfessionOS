<!-- Concept A: "Command" — Terminal Heritage Hero/Header Mockup -->
<!-- 1200×630 viewport · Dark · Bloomberg-meets-SaaS aesthetic -->
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
