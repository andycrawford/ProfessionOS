<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#100408"/>
      <stop offset="60%"  stop-color="#1E0A0A"/>
      <stop offset="100%" stop-color="#2A0E06"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="70%" r="50%">
      <stop offset="0%"  stop-color="#FF4500" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#C02800" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#100408" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="100%" r="40%">
      <stop offset="0%"  stop-color="#FF7A00" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#100408" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#core)"/>
  <rect width="1920" height="1080" fill="url(#rim)"/>
</svg>
