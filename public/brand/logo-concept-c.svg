<!-- Concept C: "Apex" — Premium Gradient -->
<!-- Logo Mark: Gradient circle with abstract geometric P mark in white -->
<!-- Wordmark: Clean white-on-dark or dark-on-light, no monospace accent -->
<svg width="280" height="56" viewBox="0 0 280 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Profession OS — Concept C: Apex</title>
  <defs>
    <!-- Primary brand gradient: teal → blue -->
    <linearGradient id="apexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
    <!-- Subtle glow for mark -->
    <filter id="markGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00C9A7" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- MARK: gradient circle -->
  <circle cx="24" cy="28" r="22" fill="url(#apexGrad)" filter="url(#markGlow)"/>

  <!-- Abstract geometric P mark in white -->
  <!-- Vertical stem -->
  <rect x="17" y="17" width="3" height="22" rx="1.5" fill="white"/>
  <!-- Curved top arc of "P" (upper bowl) -->
  <path d="M20 17 Q32 17 32 23 Q32 29 20 29" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Ascending arrow element (Apex — upward momentum) -->
  <path d="M28 36 L33 29 L38 36" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- WORDMARK (dark, works on light backgrounds; swap fill for dark bg) -->
  <text x="56" y="33" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.02em">
    <tspan fill="#070B12">Profession</tspan>
  </text>
  <!-- "OS" with gradient fill via inline trick -->
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
  </defs>
  <text x="170" y="33" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.02em" fill="url(#textGrad)"> OS</text>
</svg>
